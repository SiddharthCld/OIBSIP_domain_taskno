<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Temperature Converter 1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 20px;
        }
        
        .container {
            border: 1px solid #000000;
            padding: 20px;
            width: 250px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input,
        select,
        button {
            width: 100%;
            padding: 5px;
            margin-bottom: 15px;
            border: 1px solid #000000;
            background-color: #ffffff;
            box-sizing: border-box;
        }
        
        button {
            background-color: #e0e0e0;
            font-weight: bold;
        }
        
        button:active {
            background-color: #cccccc;
        }
        
        #result-display {
            border: 1px solid #000000;
            padding: 10px;
            min-height: 20px;
            background-color: #f9f9f9;
        }
    </style>
</head>

<body>

    <div class="container">
        <label>Temperature:</label>
        <input type="number" id="tempInput" placeholder="Enter a number">

        <label>From:</label>
        <select id="unitFrom">
        <option value="C">Celsius</option>
        <option value="F">Fahrenheit</option>
        <option value="K">Kelvin</option>
    </select>

        <label>To:</label>
        <select id="unitTo">
        <option value="F">Fahrenheit</option>
        <option value="C">Celsius</option>
        <option value="K">Kelvin</option>
    </select>

        <button onclick="convertTemperature()">Convert</button>

        <label>Result:</label>
        <div id="result-display">--</div>
    </div>

    <script>
        function convertTemperature() {
            const inputVal = document.getElementById("tempInput").value;
            const from = document.getElementById("unitFrom").value;
            const to = document.getElementById("unitTo").value;
            const display = document.getElementById("result-display");

            // Validation
            if (inputVal === "" || isNaN(inputVal)) {
                display.innerText = "Error: Enter a valid number.";
                return;
            }

            let temp = parseFloat(inputVal);
            let result = 0;

            // Convert input to Celsius first as a baseline
            let tempInC;
            if (from === "C") tempInC = temp;
            else if (from === "F") tempInC = (temp - 32) * 5 / 9;
            else if (from === "K") tempInC = temp - 273.15;

            // Convert baseline Celsius to target unit
            if (to === "C") result = tempInC;
            else if (to === "F") result = (tempInC * 9 / 5) + 32;
            else if (to === "K") result = tempInC + 273.15;

            // Display result rounded to 2 decimal places
            display.innerText = result.toFixed(2) + " °" + to;
        }
    </script>

</body>

</html>
